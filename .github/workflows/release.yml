name: Release builds

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package (${{ matrix.platform }})
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          if [ "${{ matrix.platform }}" = "linux" ]; then
            npx electron-builder --linux -c.linux.target.0.target=AppImage -c.linux.target.1.target=deb --publish never
          else
            npx electron-builder --${{ matrix.platform }} --publish never
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lingo-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.dmg
            release/*.zip
            release/*.tar.gz
          if-no-files-found: error
